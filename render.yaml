services:
  - type: web
    name: global-t20
    runtime: node
    plan: free
    buildCommand: npm install && npm run build -w frontend
    startCommand: node backend/src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: global-t20-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_ORIGIN
        value: https://global-t20.onrender.com

databases:
  - name: global-t20-db
    plan: free
